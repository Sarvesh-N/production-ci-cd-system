name: cicd-build-test

on:
  push:
    paths:
      - '02-ci-build-and-test/**'
    branches:
      - main


jobs:
  build-test-jobs:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: 02-ci-build-and-test

    steps:
      - name: checking out repo
        uses: actions/checkout@v4
      
      - name: build docker image
        run: docker build -t build-test-img .
      
      - name: run image on container
        run: docker run -d -p 5000:5000 --name build-test-container build-test-img
      
      - name: app is live or down
        run: curl -f http://localhost:5000

      - name: destroy resources

        run: docker container stop build-test-container && docker container rm build-test-container
