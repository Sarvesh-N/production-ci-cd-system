name: ci.cd build test flow

on:
  push:
    paths: 
      - "02-ci-build-and-test/**"
    branches:
      - main
      - dev

jobs:
  demo-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-ci-build-and-test
      
    # build and test
    steps:
      - name: checkouting the repo
        uses: actions/checkout@v4

      - name: install requirements
        run: pip install -r requirements.txt

      - name: build docker image
        run: docker build -t build-test-img .

      - name: run docker image as container
        run: docker run -d -p 5000:5000 build-test-img --name build-test-container
      
      - name: check app is alive or not
        run: curl -f http://localhost:5000
        

        
         

      
    