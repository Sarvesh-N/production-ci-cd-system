name: Pipeline success Deployment failure

on:
  push:
    paths:
      - '04-deployment-success-but-app-down/**'
    branches:
      - main
      - dev

jobs:
  deployment-fail-check-jobs:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: 04-deployment-success-but-app-down

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: cleanup old container
        run: |
          docker stop prod-container || true
          docker rm prod-container || true

      - name: build image
        run: docker build -t test-img .

      - name: run img in container
        run: docker run -d -p 5000:5000 --name prod-container test-img

      - name: test app
        run: |
          sleep 6
          curl -f http://localhost:5000
